name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Get version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: KolibriOS AI ${{ steps.version.outputs.VERSION }}
        body: |
          ## KolibriOS AI ${{ steps.version.outputs.VERSION }}
          
          ### New Features
          - QEMU VM Module for virtualization
          - Multiple LLM clients (OpenAI, Anthropic, Ollama, Gemini)
          - Android AVD setup support
          - Comprehensive test suite
          
          ### Installation
          ```bash
          git clone https://github.com/jascabobarbro-pixel/KolibriOS-AI.git
          cd KolibriOS-AI
          
          # Build Rust components
          cargo build --release -p kolibrios-vm
          cargo build --release -p unified-ai-agent-core
          
          # Install Python components
          pip install -e ./cnd_orchestrator/
          pip install -e ./unified_ai_agent/unified_mind/
          ```
          
          See [README.md](README.md) for full documentation.
        draft: false
        prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: kolibrios-ai-x86_64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: kolibrios-ai-x86_64-macos
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        targets: ${{ matrix.target }}
    
    - name: Build VM Module
      run: cargo build --release -p kolibrios-vm --target ${{ matrix.target }}
    
    - name: Build Unified AI Agent Core
      run: cargo build --release -p unified-ai-agent-core --target ${{ matrix.target }} || true
    
    - name: Build Koli Language
      run: cargo build --release -p koli-compiler -p koli-runtime --target ${{ matrix.target }} || true
    
    - name: Package
      run: |
        mkdir -p release
        cp target/${{ matrix.target }}/release/libkolibrios_vm*.so release/ || true
        cp target/${{ matrix.target }}/release/libkolibrios_vm*.dylib release/ || true
        cp target/${{ matrix.target }}/release/libkolibrios_vm*.a release/ || true
        cp target/${{ matrix.target }}/release/memory_cell_server release/ || true
        cp target/${{ matrix.target }}/release/processor_cell_server release/ || true
        tar -czvf ${{ matrix.artifact }}.tar.gz -C release . || echo "No binaries to package"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}.tar.gz
      continue-on-error: true

  upload-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: build-binaries
    
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
