name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Get version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: KolibriOS AI ${{ steps.version.outputs.VERSION }}
        body: |
          ## KolibriOS AI ${{ steps.version.outputs.VERSION }}
          
          ### Changes
          See [CHANGELOG.md](CHANGELOG.md) for details.
          
          ### Installation
          ```bash
          git clone https://github.com/jascabobarbro-pixel/KolibriOS-AI.git
          cd KolibriOS-AI
          cargo build --release
          ```
        draft: false
        prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: kolibri-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: kolibri-aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: kolibri-x86_64-macos
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        targets: ${{ matrix.target }}
    
    - name: Build
      run: cargo build --release --target ${{ matrix.target }}
    
    - name: Package
      run: |
        mkdir -p release
        cp target/${{ matrix.target }}/release/memory_cell_server release/ || true
        cp target/${{ matrix.target }}/release/processor_cell_server release/ || true
        tar -czvf ${{ matrix.artifact }}.tar.gz -C release .
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}.tar.gz

  upload-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: build-binaries
    
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
