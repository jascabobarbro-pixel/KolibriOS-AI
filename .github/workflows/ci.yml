name: KolibriOS AI CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==================== Rust Build & Test ====================
  rust-check:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy
    
    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Check formatting
      run: cargo fmt --all -- --check || true
    
    - name: Build VM Module
      run: cargo build -p kolibrios-vm --verbose
    
    - name: Run VM Module tests
      run: cargo test -p kolibrios-vm --verbose || true
    
    - name: Build Unified AI Agent Core
      run: cargo build -p unified-ai-agent-core --verbose || true
    
    - name: Build Koli Language
      run: cargo build -p koli-compiler -p koli-runtime --verbose || true

  # ==================== Python Build & Test ====================
  python-check:
    name: Python Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio pytest-cov pytest-mock
        pip install grpcio grpcio-tools protobuf psutil pydantic loguru
        pip install google-generativeai || true
    
    - name: Install CND Orchestrator
      run: |
        cd cnd_orchestrator
        pip install -e . || true
    
    - name: Install Unified Mind
      run: |
        cd unified_ai_agent/unified_mind
        pip install -e . || true
    
    - name: Run CND Orchestrator tests
      run: |
        pytest cnd_orchestrator/tests/ -v --tb=short || true
    
    - name: Run Unified Mind tests
      run: |
        pytest unified_ai_agent/unified_mind/tests/ -v --tb=short || true

  # ==================== Security Scan ====================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Run cargo audit
      run: |
        cargo install cargo-audit
        cargo audit || true
    
    - name: Install Python safety
      run: pip install safety
    
    - name: Run safety check
      run: |
        safety check -r cnd_orchestrator/requirements.txt || true
        safety check -r unified_ai_agent/unified_mind/requirements.txt || true
      continue-on-error: true

  # ==================== Documentation ====================
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Build Rust docs
      run: cargo doc --no-deps -p kolibrios-vm -p unified-ai-agent-core -p koli-compiler || true
    
    - name: Upload docs
      uses: actions/upload-artifact@v4
      with:
        name: docs
        path: target/doc/
        retention-days: 7
      continue-on-error: true

  # ==================== Final Status ====================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [rust-check, python-check, security, docs]
    if: always()
    
    steps:
    - name: Check status
      run: |
        echo "Rust check: ${{ needs.rust-check.result }}"
        echo "Python check: ${{ needs.python-check.result }}"
        echo "Security: ${{ needs.security.result }}"
        echo "Docs: ${{ needs.docs.result }}"
        echo "CI completed!"
