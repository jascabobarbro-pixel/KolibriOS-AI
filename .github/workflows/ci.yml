name: KolibriOS AI CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==================== Rust Build & Test ====================
  rust-check:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, nightly]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy
    
    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Check formatting
      run: cargo fmt --all -- --check
    
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
    
    - name: Build
      run: cargo build --verbose
    
    - name: Run tests
      run: cargo test --verbose --all
    
    - name: Run benchmarks (noisy)
      run: cargo bench --no-run || true

  # ==================== Python Build & Test ====================
  python-check:
    name: Python Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio pytest-cov black ruff mypy
        pip install -e ./cnd_orchestrator/ || true
        pip install -e ./unified_ai_agent/unified_mind/ || true
    
    - name: Check formatting
      run: black --check --diff cnd_orchestrator/ unified_ai_agent/ || true
    
    - name: Lint
      run: ruff check cnd_orchestrator/ unified_ai_agent/ || true
    
    - name: Type check
      run: mypy cnd_orchestrator/ unified_ai_agent/ --ignore-missing-imports || true
    
    - name: Run tests
      run: |
        pytest cnd_orchestrator/tests/ -v --cov=cnd_orchestrator --cov-report=xml || true
        pytest unified_ai_agent/unified_mind/tests/ -v --cov=unified_mind --cov-report=xml || true
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      if: matrix.python == '3.11'
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  # ==================== Security Scan ====================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Run cargo audit
      run: |
        cargo install cargo-audit
        cargo audit || true
    
    - name: Run safety check
      run: |
        pip install safety
        safety check -r cnd_orchestrator/requirements.txt || true
        safety check -r unified_ai_agent/unified_mind/requirements.txt || true

  # ==================== Documentation ====================
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Build Rust docs
      run: cargo doc --no-deps --all || true
    
    - name: Upload docs
      uses: actions/upload-artifact@v4
      with:
        name: docs
        path: target/doc/
        retention-days: 7

  # ==================== Benchmarks ====================
  benchmarks:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run benchmarks
      run: cargo bench --no-run || true

  # ==================== Final Status ====================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [rust-check, python-check, security, docs]
    if: always()
    
    steps:
    - name: Check status
      run: |
        if [[ "${{ needs.rust-check.result }}" == "failure" ]] || \
           [[ "${{ needs.python-check.result }}" == "failure" ]]; then
          echo "CI failed!"
          exit 1
        fi
        echo "CI passed!"
