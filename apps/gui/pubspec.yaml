name: kolibrios_gui
description: KolibriOS AI - Adaptive GUI with Living Applications
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9
  
  # UI Components
  flutter_animate: ^4.3.0
  google_fonts: ^6.1.0
  iconsax: ^0.0.8
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  
  # Networking & gRPC
  grpc: ^3.2.4
  protobuf: ^3.1.0
  http: ^1.1.2
  web_socket_channel: ^2.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Utils
  path_provider: ^2.1.1
  uuid: ^4.2.2
  intl: ^0.18.1
  flutter_local_notifications: ^16.3.0
  
  # AI Integration
  dart_openai: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  
  fonts:
    - family: KolibriIcons
      fonts:
        - asset: assets/fonts/KolibriIcons.ttf
